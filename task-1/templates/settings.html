<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings | SysAdminPanel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 0.9rem; overflow-x: hidden; }
        .navbar-dark { background-color: #343a40; border-bottom: 1px solid #4b545c; height: 60px; }
        .sidebar { position: fixed; top: 60px; bottom: 0; left: 0; z-index: 100; padding: 0; box-shadow: inset -1px 0 0 rgba(0, 0, 0, .1); width: 240px; background-color: #343a40; color: #c2c7d0; }
        .sidebar-sticky { position: relative; top: 0; height: calc(100vh - 60px); padding-top: .5rem; overflow-x: hidden; overflow-y: auto; }
        .nav-link { color: #c2c7d0; padding: 10px 20px; font-weight: 500; }
        .nav-link:hover { color: #fff; background-color: rgba(255,255,255,.1); }
        .nav-link.active { color: #fff; background-color: #007bff; border-radius: 0; }
        .sidebar-heading { font-size: .75rem; text-transform: uppercase; color: #6c757d; padding: 10px 20px; margin-top: 10px; }
        main { margin-left: 240px; padding: 20px; margin-top: 60px; }
        .card { border: none; box-shadow: 0 0 1px rgba(0,0,0,.125), 0 1px 3px rgba(0,0,0,.2); margin-bottom: 20px; border-radius: 0.25rem; border-top: 3px solid #d2d6de; }
        .card-header { background-color: #fff; border-bottom: 1px solid #f4f4f4; font-weight: 600; color: #444; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark fixed-top flex-md-nowrap p-0 shadow">
        <a class="navbar-brand col-sm-3 col-md-2 mr-0 px-3" href="#"><i class="fas fa-server me-2"></i> SysAdmin<span style="font-weight: 300">Panel</span></a>
        <ul class="navbar-nav px-3 ms-auto d-flex flex-row">
            <li class="nav-item text-nowrap"><a class="nav-link text-danger" href="/"><i class="fas fa-sign-out-alt"></i> Sign out</a></li>
        </ul>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 d-none d-md-block sidebar">
                <div class="sidebar-sticky">
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link" href="/packages"><i class="fas fa-box me-2"></i> Packages</a></li>
                        <li class="nav-item"><a class="nav-link" href="/users"><i class="fas fa-users me-2"></i> Users</a></li>
                        <h6 class="sidebar-heading">Maintenance</h6>
                        <li class="nav-item"><a class="nav-link" href="/backups"><i class="fas fa-hdd me-2"></i> Backups</a></li>
                        <li class="nav-item"><a class="nav-link" href="/logs"><i class="fas fa-file-alt me-2"></i> Logs</a></li>
                        <h6 class="sidebar-heading">System</h6>
                        <li class="nav-item"><a class="nav-link" href="/ssh_client"><i class="fas fa-terminal me-2"></i> Terminal</a></li>
                        <li class="nav-item"><a class="nav-link active" href="/settings"><i class="fas fa-cog me-2"></i> Settings</a></li>
                    </ul>
                </div>
            </nav>

            <main role="main" class="col-md-9 ms-sm-auto col-lg-10">
                <h1 class="h3 mb-4">System Settings</h1>

                <div class="row">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">General</div>
                            <div class="card-body">
                                <form>
                                    <div class="mb-3">
                                        <label class="form-label">Server Name</label>
                                        <input type="text" class="form-control" value="server-01.corp.local" readonly>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Admin Email</label>
                                        <input type="email" class="form-control" value="admin@corp.local" readonly>
                                    </div>
                                    <div class="form-check mb-3">
                                        <input class="form-check-input" type="checkbox" checked disabled>
                                        <label class="form-check-label">Enable SSH Access</label>
                                    </div>
                                    <div class="form-check mb-3">
                                        <input class="form-check-input" type="checkbox" disabled>
                                        <label class="form-check-label">Debug Mode</label>
                                    </div>
                                    
                                    <div class="alert alert-danger mt-3">
                                        <i class="fas fa-lock"></i> Settings are locked by administrator policy.
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
