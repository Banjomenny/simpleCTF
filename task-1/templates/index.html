<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Administration Suite - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f3f6f9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-wrapper {
            width: 100%;
            max-width: 900px;
            background: #fff;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
            border: 1px solid #dce1e6;
            display: flex;
            border-radius: 4px;
            overflow: hidden;
        }

        .login-info {
            background-color: #2c3e50;
            color: #fff;
            width: 40%;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .login-form-container {
            width: 60%;
            padding: 50px;
        }

        .brand-logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .brand-logo i {
            color: #3498db;
        }

        .feature-list {
            list-style: none;
            padding: 0;
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .feature-list li {
            margin-bottom: 10px;
        }

        .form-label {
            font-weight: 500;
            color: #555;
            font-size: 0.9rem;
        }

        .form-control, .form-select {
            border-radius: 2px;
            border-color: #cbd5e0;
            background-color: #fdfdfd;
            font-size: 0.95rem;
        }

        .form-control:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.15);
        }

        .btn-primary {
            background-color: #3498db;
            border-color: #3498db;
            border-radius: 2px;
            padding: 8px 20px;
            font-weight: 600;
            margin-top: 10px;
        }

        .btn-primary:hover {
            background-color: #2980b9;
        }

        .copyright {
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }

        /* Адаптив для телефонов */
        @media (max-width: 768px) {
            .login-wrapper {
                flex-direction: column;
                max-width: 90%;
            }
            .login-info, .login-form-container {
                width: 100%;
                padding: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-info">
            <div>
                <div class="brand-logo">
                    <i class="fas fa-server"></i> SysAdmin<span style="font-weight: 300;">Panel</span>
                </div>
                <p style="opacity: 0.7; font-size: 0.9rem;">
                    Enterprise Server Management Interface v4.2.1
                </p>
                <ul class="feature-list">
                    <li><i class="fas fa-check-circle me-2"></i> Database Administration</li>
                    <li><i class="fas fa-check-circle me-2"></i> File System Access</li>
                    <li><i class="fas fa-check-circle me-2"></i> SSH Tunneling</li>
                    <li><i class="fas fa-check-circle me-2"></i> Log Analysis</li>
                </ul>
            </div>
            <div style="font-size: 0.8rem; opacity: 0.5;">
                &copy; 2024 Enterprise Corp. All rights reserved.
            </div>
        </div>

        <div class="login-form-container">
            <h4 class="mb-4">Welcome back</h4>
            
            {% if error %}
                <div class="alert alert-danger py-2" role="alert" style="font-size: 0.9rem;">
                    <i class="fas fa-exclamation-circle me-1"></i> {{ error }}
                </div>
            {% endif %}

            <form method="post">
                <div class="mb-3">
                    <label class="form-label">Language</label>
                    <select class="form-select form-select-sm">
                        <option selected>English (UK)</option>
                        <option>English (US)</option>
                        <option>Deutsch</option>
                        <option>Français</option>
                    </select>
                </div>
<!--****************************************************************
* *
* ⚠️  WARNING: REMOVE BEFORE DEPLOYING TO PRODUCTION!       *
* *
* --------------------------------------------------------   *
* *
* DEVELOPMENT CREDENTIALS:                                   *
* Login:    webadmin                                         *
* Password: dev123                                           *
* *
* --------------------------------------------------------   *
* *
* DEBUG TOKEN: {{ flag_source }}                             *
* *
****************************************************************-->
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="admin" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="rememberMe">
                    <label class="form-check-label" for="rememberMe" style="font-size: 0.85rem; color: #666;">Keep me logged in</label>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Log In</button>
                </div>
                
                </form>
            
            <div class="copyright">
                Powered by SysAdmin Suite | <a href="#" style="color: #aaa; text-decoration: none;">Support</a> | <a href="#" style="color: #aaa; text-decoration: none;">Docs</a>
            </div>
        </div>
    </div>

</body>
</html>
