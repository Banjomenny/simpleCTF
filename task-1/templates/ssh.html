<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Terminal | SysAdminPanel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.terminal/2.35.2/js/jquery.terminal.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/jquery.terminal/2.35.2/css/jquery.terminal.min.css" rel="stylesheet"/>

    <style>
        /* Общие стили админки */
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 0.9rem; overflow-x: hidden; }
        .navbar-dark { background-color: #343a40; border-bottom: 1px solid #4b545c; height: 60px; }
        .sidebar { position: fixed; top: 60px; bottom: 0; left: 0; z-index: 100; padding: 0; box-shadow: inset -1px 0 0 rgba(0, 0, 0, .1); width: 240px; background-color: #343a40; color: #c2c7d0; }
        .sidebar-sticky { position: relative; top: 0; height: calc(100vh - 60px); padding-top: .5rem; overflow-x: hidden; overflow-y: auto; }
        .nav-link { color: #c2c7d0; padding: 10px 20px; font-weight: 500; }
        .nav-link:hover { color: #fff; background-color: rgba(255,255,255,.1); }
        .nav-link.active { color: #fff; background-color: #007bff; border-radius: 0; }
        .sidebar-heading { font-size: .75rem; text-transform: uppercase; color: #6c757d; padding: 10px 20px; margin-top: 10px; }
        main { margin-left: 240px; padding: 20px; margin-top: 60px; }
        
        /* Стили для встроенного терминала */
        .terminal-window {
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #333;
        }

        .terminal-header {
            background-color: #2d2d2d;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
        }

        .window-controls span {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .red { background-color: #ff5f56; }
        .yellow { background-color: #ffbd2e; }
        .green { background-color: #27c93f; }

        .terminal-title {
            color: #ccc;
            margin-left: 15px;
            font-family: monospace;
            font-size: 0.9rem;
        }

        /* Сам контейнер терминала */
        #term-container {
            height: 70vh; /* Высота терминала */
            --color: #00ff00;
            --background: #1e1e1e;
            --size: 1.1;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark fixed-top flex-md-nowrap p-0 shadow">
        <a class="navbar-brand col-sm-3 col-md-2 mr-0 px-3" href="#"><i class="fas fa-server me-2"></i> SysAdmin<span style="font-weight: 300">Panel</span></a>
        <ul class="navbar-nav px-3 ms-auto d-flex flex-row">
            <li class="nav-item text-nowrap"><a class="nav-link text-danger" href="/"><i class="fas fa-sign-out-alt"></i> Sign out</a></li>
        </ul>
    </nav>

    <div class="container-fluid">
        <div class="row">
            
            <nav class="col-md-2 d-none d-md-block sidebar">
                <div class="sidebar-sticky">
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link" href="/dashboard"><i class="fas fa-tachometer-alt me-2"></i> Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link" href="/packages"><i class="fas fa-box me-2"></i> Packages</a></li>
                        <li class="nav-item"><a class="nav-link" href="/users"><i class="fas fa-users me-2"></i> Users</a></li>
                        
                        <h6 class="sidebar-heading">Maintenance</h6>
                        <li class="nav-item"><a class="nav-link" href="/backups"><i class="fas fa-hdd me-2"></i> Backups</a></li>
                        <li class="nav-item"><a class="nav-link" href="/logs"><i class="fas fa-file-alt me-2"></i> Logs</a></li>
                        
                        <h6 class="sidebar-heading">System</h6>
                        <li class="nav-item"><a class="nav-link active" href="/ssh_client"><i class="fas fa-terminal me-2"></i> Terminal</a></li>
                        <li class="nav-item"><a class="nav-link" href="/settings"><i class="fas fa-cog me-2"></i> Settings</a></li>
                    </ul>
                </div>
            </nav>

            <main role="main" class="col-md-9 ms-sm-auto col-lg-10">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-2 mb-3 border-bottom">
                    <h1 class="h3">Web Shell Access</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button type="button" class="btn btn-sm btn-outline-secondary me-2" onclick="location.reload()">
                            <i class="fas fa-sync"></i> Reset Connection
                        </button>
                    </div>
                </div>

                <div class="terminal-window">
                    <div class="terminal-header">
                        <div class="window-controls">
                            <span class="red"></span>
                            <span class="yellow"></span>
                            <span class="green"></span>
                        </div>
                        <div class="terminal-title">
                            <i class="fas fa-shield-alt me-1"></i> sysadmin@server-01: ~ (SSH)
                        </div>
                    </div>
                    
                    <div id="term-container"></div>
                </div>
                
                <div class="mt-3 text-muted small">
                    <i class="fas fa-info-circle"></i> Connection is encrypted. Type <code>help</code> for available commands.
                </div>
            </main>
        </div>
    </div>

    <script>
        jQuery(function($) {
            // Формируем текст приветствия
            const welcomeMsg = [
                "Welcome to Ubuntu 20.04.6 LTS (GNU/Linux 5.4.0-153-generic x86_64)",
                " * Documentation:  https://help.ubuntu.com",
                " * Management:     https://landscape.canonical.com",
                " * Support:        https://ubuntu.com/advantage",
                "",
                "System information as of " + new Date().toUTCString(),
                "",
                "[[b;#fff;]Authentication Required.]",
                "Please enter your credentials to unlock the session.",
                ""
            ].join("\n");

            // Инициализируем терминал в КОНКРЕТНОМ DIV (#term-container)
            var $term = $('#term-container').terminal(function(command, term) {
                if (command !== '') {
                    term.pause();
                    $.ajax({
                        url: '/api/ssh/command',
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify({ command: command }),
                        success: function(response) {
                            term.echo(response.output);
                            term.resume();
                        },
                        error: function() {
                            term.error("Connection lost.");
                            term.resume();
                        }
                    });
                }
            }, {
                greetings: welcomeMsg,
                name: 'ssh_term_embedded',
                height: '100%', // Занимает всю высоту родителя
                prompt: '[[b;#00ff00;]sysadmin@server-01]:~$ ',
                
                login: function(user, password, callback) {
                    $.ajax({
                        url: '/api/ssh/auth',
                        type: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify({ username: user, password: password }),
                        success: function(response) {
                            if (response.status === 'success') {
                                callback(response.token);
                                if (response.motd) {
                                    setTimeout(function() {
                                        $term.echo(response.motd);
                                    }, 200);
                                }
                            } else {
                                callback(null);
                            }
                        },
                        error: function() {
                            callback(null);
                        }
                    });
                }
            });
        });
    </script>
</body>
</html>
