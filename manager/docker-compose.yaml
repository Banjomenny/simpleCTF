services:
  manager:
    build: .
    container_name: ctf_manager
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # Mount Docker socket so the manager can call `docker compose` on the host
      - /var/run/docker.sock:/var/run/docker.sock
      # Persist the SQLite database across container restarts
      - ./data:/app/data
      # Active CTF challenge compose file (set via .env CTF_COMPOSE_HOST_PATH)
      - ${CTF_COMPOSE_HOST_PATH:-../challenge/docker-compose.yaml}:/ctf/challenge/docker-compose.yaml:ro
      # JSON config directory (set via .env, contains bankingai.json or task1.json)
      - ${CTF_CONFIG_DIR:-./config}:/ctf/config:ro
    environment:
      # --- REQUIRED: change these before running ---
      SECRET_KEY:        "${SECRET_KEY:-change-me-to-a-random-string}"
      ADMIN_TOKEN:       "${ADMIN_TOKEN:-change-me-to-a-secret-token}"

      # Path to the compose file as seen INSIDE the manager container.
      # The file is bind-mounted from CTF_COMPOSE_HOST_PATH (see volumes above).
      # Do not change this unless you change the volume mount target too.
      CTF_COMPOSE_FILE:  "/ctf/challenge/docker-compose.yaml"

      # Absolute path to the challenge directory on the HOST machine.
      # Used as --project-directory so the Docker daemon resolves relative bind mounts
      # (e.g. ./web/src) against the real host filesystem, not the container filesystem.
      CHALLENGE_DIR:     "${CTF_CHALLENGE_DIR:-/home/user/ctf/challenge}"

      # IP or hostname teams will use to reach their instance.
      HOST_IP:           "${HOST_IP:-192.168.1.10}"

      # First port in the range assigned to team instances (inclusive).
      PORT_RANGE_START:  "${PORT_RANGE_START:-8000}"

      # Secret used to derive per-team flags.
      FLAG_SECRET:       "${FLAG_SECRET:-change-me-flag-secret}"

      # Path to the CTF JSON config inside the container (mounted via CTF_CONFIG_DIR).
      CTF_CONFIG_FILE:   "${CTF_CONFIG_FILE:-/ctf/config/bankingai.json}"

      # Display name for the CTF (shown in page titles).
      CTF_NAME:          "${CTF_NAME:-BankingAI CTF}"

      # Docker service name for the web container (usually 'web').
      WEB_SERVICE_NAME:  "${WEB_SERVICE_NAME:-web}"

      # Seconds to wait for the web container to become ready.
      STARTUP_TIMEOUT:   "${STARTUP_TIMEOUT:-180}"

      # IANA timezone name for score timestamps (e.g. America/New_York).
      TZ_NAME:           "${TZ_NAME:-America/New_York}"
